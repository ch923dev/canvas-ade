<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Blossom River — generated scene</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      html,
      body {
        height: 100%;
      }
      body {
        background: #0a0a0b;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }
      #bar {
        flex: none;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 16px;
        background: #1a1a1d;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      #bar span {
        font-size: 12px;
        color: #9b9ba1;
      }
      #bar .meta {
        font-family: ui-monospace, Consolas, monospace;
        font-size: 11px;
        color: #7b7b81;
      }
      button {
        font-size: 11px;
        font-weight: 500;
        color: #9b9ba1;
        background: #1e1e22;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 5px;
        padding: 4px 10px;
        cursor: pointer;
      }
      button:hover {
        color: #ededee;
        border-color: rgba(255, 255, 255, 0.16);
      }
      #wrap {
        flex: 1;
        position: relative;
        min-height: 0;
      }
      canvas#view {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div id="bar">
      <span><b style="color: #ededee">Blossom River</b> — code-painted scene</span>
      <button id="dl1080">Download PNG 1920×1080</button>
      <button id="dl4k">Download PNG 3840×2160</button>
      <button id="reseed">Reseed</button>
      <span class="meta"
        >animated: clouds · water shimmer · falling petals — PNG export is the still</span
      >
    </div>
    <div id="wrap"><canvas id="view"></canvas></div>
    <script>
      'use strict'
      /* Seeded RNG so the composition is stable (Reseed to explore variants) */
      let SEED = parseInt(localStorage.getItem('blossom-seed') || '7', 10)
      function mulberry32(a) {
        return function () {
          a |= 0
          a = (a + 0x6d2b79f5) | 0
          let t = Math.imul(a ^ (a >>> 15), 1 | a)
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296
        }
      }

      /* ---------- palette ---------- */
      const P = {
        skyTop: '#3f9fe6',
        skyMid: '#7cc4f0',
        skyHorizon: '#d9effb',
        cloud: '#ffffff',
        cloudShade: '#cfe4f2',
        mtn: '#b7cdde',
        mtnShadow: '#9cb6cb',
        snow: '#f1f8fd',
        grassFar: '#dca35e',
        grassMid: '#cf8d44',
        grassNear: '#c17a33',
        grassLight: '#ecbf76',
        grassDark: '#a96526',
        riverFar: '#bfe2f2',
        riverMid: '#3a7cc4',
        riverNear: '#225a9e',
        riverDeep: '#1b4a85',
        bankEdge: 'rgba(120,80,35,0.55)',
        trunk: '#6b4434',
        trunkDark: '#553527',
        canopy: ['#c75b85', '#d96b92', '#e687ab', '#f3aac6'],
        canopyHi: '#fbd2e2',
        petal: '#f4a8c4'
      }

      /* ---------- scene model (built once per seed/size) ---------- */
      function buildScene(W, H, rnd) {
        const horizon = H * 0.5,
          riverTop = H * 0.52
        // river banks per scanline
        const xl = [],
          xr = []
        for (let y = 0; y < H; y++) {
          if (y < riverTop) {
            xl[y] = -1
            xr[y] = -1
            continue
          }
          const u = (y - riverTop) / (H - riverTop)
          const cx = W * (0.52 + 0.1 * Math.sin(u * 3.0 - 0.4) * (1 - u * 0.5) - 0.05 * u)
          const hw = W * (0.012 + 0.3 * Math.pow(u, 1.55))
          xl[y] = cx - hw
          xr[y] = cx + hw
        }
        // clouds: x, y, scale, speed
        const clouds = []
        for (let i = 0; i < 7; i++) {
          clouds.push({
            x: rnd() * W * 1.2 - W * 0.1,
            y: H * (0.06 + rnd() * 0.3),
            s: W * (0.05 + rnd() * 0.075),
            v: 2.5 + rnd() * 4
          })
        }
        // mid/foreground blossom trees on the banks (x frac, base y frac, scale frac of H)
        const trees = [
          { x: 0.16, y: 0.615, s: 0.34 },
          { x: 0.33, y: 0.565, s: 0.22 },
          { x: 0.63, y: 0.575, s: 0.24 },
          { x: 0.79, y: 0.635, s: 0.38 },
          { x: 0.91, y: 0.56, s: 0.2 },
          { x: 0.035, y: 0.86, s: 0.62 }, // foreground framing, left
          { x: 0.975, y: 0.92, s: 0.7 } // foreground framing, right
        ].map((t) => ({ x: t.x * W, y: t.y * H, s: t.s * H, blobs: makeCanopy(rnd) }))
        // distant pink treeline dots
        const farTrees = []
        for (let i = 0; i < 26; i++) {
          const fx = rnd() * W
          farTrees.push({ x: fx, y: horizon - 2 - rnd() * 8, s: 7 + rnd() * 14 })
        }
        // grass tufts + flowers
        const tufts = []
        for (let i = 0; i < 420; i++) {
          const y = riverTop + Math.pow(rnd(), 0.7) * (H - riverTop) * 0.98
          const side = rnd() < 0.5
          const margin = 8 + rnd() * (W * 0.05)
          let x = side
            ? rnd() * Math.max(0, xl[Math.floor(y)] - margin)
            : Math.min(W, xr[Math.floor(y)] + margin) +
              rnd() * Math.max(0, W - xr[Math.floor(y)] - margin)
          if (!isFinite(x)) continue
          tufts.push({ x, y, s: 2 + (y / H) * 9 * rnd(), kind: rnd() })
        }
        // petals
        const petals = []
        for (let i = 0; i < 70; i++) {
          petals.push({
            x: rnd() * W,
            y: rnd() * H,
            s: 2 + rnd() * 3.5,
            vy: 12 + rnd() * 22,
            ph: rnd() * Math.PI * 2,
            sway: 10 + rnd() * 26,
            rot: rnd() * Math.PI
          })
        }
        return { W, H, horizon, riverTop, xl, xr, clouds, trees, farTrees, tufts, petals }
      }
      function makeCanopy(rnd) {
        const blobs = []
        for (let i = 0; i < 90; i++) {
          const a = rnd() * Math.PI * 2,
            d = Math.pow(rnd(), 0.55)
          blobs.push({
            dx: Math.cos(a) * d,
            dy: Math.sin(a) * d * 0.78,
            r: 0.045 + rnd() * 0.085,
            c: rnd()
          })
        }
        return blobs
      }

      /* ---------- painters ---------- */
      function paintSky(x, S) {
        const g = x.createLinearGradient(0, 0, 0, S.horizon * 1.04)
        g.addColorStop(0, P.skyTop)
        g.addColorStop(0.62, P.skyMid)
        g.addColorStop(1, P.skyHorizon)
        x.fillStyle = g
        x.fillRect(0, 0, S.W, S.horizon * 1.05)
      }
      function paintCloud(x, cx, cy, s) {
        const puffs = [
          [0, 0, 0.52],
          [0.5, 0.1, 0.4],
          [-0.5, 0.12, 0.38],
          [0.2, -0.24, 0.36],
          [-0.22, -0.2, 0.3],
          [0.02, 0.16, 0.46]
        ]
        x.fillStyle = P.cloudShade
        for (const [px, py, pr] of puffs) {
          x.beginPath()
          x.arc(cx + px * s, cy + (py + 0.1) * s, pr * s, 0, 7)
          x.fill()
        }
        x.fillStyle = P.cloud
        for (const [px, py, pr] of puffs) {
          x.beginPath()
          x.arc(cx + px * s, cy + (py - 0.04) * s, pr * s, 0, 7)
          x.fill()
        }
      }
      function paintMountains(x, S) {
        const { W, horizon } = S
        x.fillStyle = P.mtn
        x.beginPath()
        x.moveTo(0, horizon)
        const pts = [
          [0, 0.88],
          [0.08, 0.78],
          [0.16, 0.86],
          [0.24, 0.8],
          [0.5, 0.92],
          [0.62, 0.84],
          [0.72, 0.9],
          [0.84, 0.79],
          [0.93, 0.87],
          [1, 0.83]
        ]
        for (const [fx, fy] of pts) x.lineTo(fx * W, horizon * fy)
        x.lineTo(W, horizon)
        x.closePath()
        x.fill()
        // snow caps on the two tallest
        x.fillStyle = P.snow
        for (const [fx, fy] of [
          [0.08, 0.78],
          [0.84, 0.79]
        ]) {
          x.beginPath()
          x.moveTo(fx * W - W * 0.02, horizon * (fy + 0.045))
          x.lineTo(fx * W, horizon * fy)
          x.lineTo(fx * W + W * 0.02, horizon * (fy + 0.045))
          x.quadraticCurveTo(
            fx * W,
            horizon * (fy + 0.07),
            fx * W - W * 0.02,
            horizon * (fy + 0.045)
          )
          x.fill()
        }
        // haze where mountains meet land
        x.fillStyle = 'rgba(217,239,251,0.5)'
        x.fillRect(0, horizon * 0.94, W, horizon * 0.07)
      }
      function paintLand(x, S) {
        const { W, H, horizon } = S
        const g = x.createLinearGradient(0, horizon, 0, H)
        g.addColorStop(0, P.grassFar)
        g.addColorStop(0.45, P.grassMid)
        g.addColorStop(1, P.grassNear)
        x.fillStyle = g
        x.fillRect(0, horizon, W, H - horizon)
        // soft rolling shading bands
        const bands = [
          [0.22, 0.28, 0.26, 0.1, -0.08, 'rgba(255,231,170,0.20)'],
          [0.8, 0.36, 0.24, 0.12, 0.06, 'rgba(255,231,170,0.18)'],
          [0.1, 0.62, 0.22, 0.13, -0.05, 'rgba(255,220,150,0.13)'],
          [0.92, 0.72, 0.2, 0.15, 0.04, 'rgba(255,220,150,0.12)'],
          [0.55, 0.16, 0.3, 0.07, 0.03, 'rgba(120,70,25,0.13)'],
          [0.3, 0.46, 0.24, 0.09, 0.05, 'rgba(120,70,25,0.10)'],
          [0.72, 0.55, 0.26, 0.1, -0.04, 'rgba(120,70,25,0.09)']
        ]
        for (const [fx, fy, rx, ry, rot, col] of bands) {
          x.fillStyle = col
          x.beginPath()
          x.ellipse(W * fx, horizon + (H - horizon) * fy, W * rx, (H - horizon) * ry, rot, 0, 7)
          x.fill()
        }
        // fine grass texture striping (short horizontal grain, denser near bottom)
        for (let i = 0; i < 240; i++) {
          const u = Math.pow((i * 0.618034) % 1, 0.8)
          const yy = horizon + u * (H - horizon) * 0.985
          const xx = (i * 379.7) % W
          x.strokeStyle = i % 3 === 0 ? 'rgba(255,225,160,0.12)' : 'rgba(120,70,25,0.10)'
          x.lineWidth = 1 + u * 1.6
          x.beginPath()
          x.moveTo(xx, yy)
          x.lineTo(xx + 14 + u * 46, yy)
          x.stroke()
        }
      }
      function riverPathTrace(x, S) {
        const { riverTop, H, xl, xr } = S
        x.beginPath()
        x.moveTo(xl[Math.floor(riverTop)], riverTop)
        for (let y = Math.floor(riverTop); y < H; y += 3) x.lineTo(xl[y], y)
        x.lineTo(xl[H - 1], H)
        x.lineTo(xr[H - 1], H)
        for (let y = H - 1; y >= riverTop; y -= 3) x.lineTo(xr[y], y)
        x.closePath()
      }
      function paintRiver(x, S) {
        const { riverTop, H } = S
        riverPathTrace(x, S)
        const g = x.createLinearGradient(0, riverTop, 0, H)
        g.addColorStop(0, P.riverFar)
        g.addColorStop(0.22, P.riverMid)
        g.addColorStop(0.7, P.riverNear)
        g.addColorStop(1, P.riverDeep)
        x.fillStyle = g
        x.fill()
        // bank edge
        x.strokeStyle = P.bankEdge
        x.lineWidth = Math.max(1.5, S.H / 480)
        riverPathTrace(x, S)
        x.stroke()
      }
      function paintReflections(x, S) {
        // soft pink + warm smears inside the river under the bank trees
        const { xl, xr, riverTop, H } = S
        x.save()
        riverPathTrace(x, S)
        x.clip()
        for (const t of S.trees) {
          if (t.y > H * 0.8) continue // skip foreground framing trees
          const y0 = Math.max(riverTop + 4, t.y + 6)
          const len = t.s * 0.9
          for (let i = 0; i < 26; i++) {
            const yy = y0 + (i / 26) * len
            if (yy >= H) break
            const row = Math.floor(yy)
            const cx = Math.min(Math.max(t.x, xl[row] + 8), xr[row] - 8)
            const ww = t.s * 0.34 * (1 - i / 30)
            x.strokeStyle = `rgba(231,135,171,${(0.1 * (1 - i / 26)).toFixed(3)})`
            x.lineWidth = 2 + (i % 3)
            x.beginPath()
            x.moveTo(cx - ww / 2, yy)
            x.lineTo(cx + ww / 2, yy)
            x.stroke()
          }
        }
        // sky reflection streak near the far bend
        x.fillStyle = 'rgba(235,248,255,0.25)'
        for (let y = Math.floor(riverTop); y < riverTop + (H - riverTop) * 0.12; y += 2) {
          x.fillRect(xl[y], y, xr[y] - xl[y], 1)
        }
        x.restore()
      }
      function paintShimmer(x, S, t, rnd) {
        const { xl, xr, riverTop, H } = S
        x.save()
        riverPathTrace(x, S)
        x.clip()
        for (let i = 0; i < 130; i++) {
          const u = (i * 0.61803 + 0.13) % 1
          const yy = Math.floor(riverTop + u * (H - riverTop - 2))
          const span = xr[yy] - xl[yy]
          if (span < 10) continue
          const drift = (t * (6 + (i % 7) * 3)) % (span * 1.4)
          const xx = xl[yy] + ((((i * 197) % span) + drift) % span)
          const a = 0.04 + 0.05 * Math.sin(t * 1.1 + i * 1.7) + (u < 0.25 ? 0.05 : 0)
          if (a <= 0.015) continue
          x.strokeStyle = `rgba(225,242,252,${Math.max(0.015, a).toFixed(3)})`
          x.lineWidth = 1 + (i % 2)
          const len = 8 + (i % 5) * 9 + u * 26
          x.beginPath()
          x.moveTo(xx, yy)
          x.lineTo(xx + len, yy)
          x.stroke()
        }
        // floating petal patches
        for (let i = 0; i < 28; i++) {
          const u = (i * 0.381966 + 0.4) % 1
          const yy = Math.floor(riverTop + u * (H - riverTop - 2))
          const span = xr[yy] - xl[yy]
          if (span < 12) continue
          const xx = xl[yy] + ((i * 311 + t * (3 + (i % 4)) * 4) % span)
          x.fillStyle = `rgba(244,168,196,${(0.25 + 0.1 * Math.sin(t + i)).toFixed(2)})`
          x.beginPath()
          x.ellipse(xx, yy, 2.6 + (i % 3), 1.3, 0, 0, 7)
          x.fill()
        }
        x.restore()
      }
      function paintFarTrees(x, S) {
        for (const f of S.farTrees) {
          x.fillStyle = 'rgba(214,123,158,0.75)'
          x.beginPath()
          x.arc(f.x, f.y, f.s, 0, 7)
          x.fill()
          x.fillStyle = 'rgba(243,170,198,0.5)'
          x.beginPath()
          x.arc(f.x - f.s * 0.25, f.y - f.s * 0.3, f.s * 0.6, 0, 7)
          x.fill()
        }
      }
      function paintTree(x, t, S) {
        const { s } = t
        // ground shadow
        x.fillStyle = 'rgba(95,55,18,0.22)'
        x.beginPath()
        x.ellipse(t.x, t.y + s * 0.012, s * 0.3, s * 0.05, 0, 0, 7)
        x.fill()
        // trunk
        x.strokeStyle = P.trunk
        x.lineCap = 'round'
        x.lineWidth = s * 0.045
        x.beginPath()
        x.moveTo(t.x, t.y)
        x.quadraticCurveTo(t.x + s * 0.03, t.y - s * 0.25, t.x - s * 0.02, t.y - s * 0.46)
        x.stroke()
        x.lineWidth = s * 0.022
        x.beginPath()
        x.moveTo(t.x - s * 0.005, t.y - s * 0.3)
        x.quadraticCurveTo(t.x + s * 0.12, t.y - s * 0.42, t.x + s * 0.16, t.y - s * 0.52)
        x.stroke()
        x.beginPath()
        x.moveTo(t.x - s * 0.01, t.y - s * 0.36)
        x.quadraticCurveTo(t.x - s * 0.14, t.y - s * 0.46, t.x - s * 0.17, t.y - s * 0.55)
        x.stroke()
        // canopy blobs (light from upper-left); dark base pass first for depth
        const cy = t.y - s * 0.6,
          R = s * 0.42
        x.fillStyle = P.canopy[0]
        x.beginPath()
        x.ellipse(t.x, cy + R * 0.08, R * 0.92, R * 0.74, 0, 0, 7)
        x.fill()
        for (const b of t.blobs) {
          const bx = t.x + b.dx * R,
            by = cy + b.dy * R
          const light = 0.5 - (b.dx * 0.3 + b.dy * 0.62) + (b.c - 0.5) * 0.22 // upper-left lighter + jitter
          let c
          if (light > 0.78) c = P.canopyHi
          else
            c =
              P.canopy[
                Math.max(
                  0,
                  Math.min(P.canopy.length - 1, Math.floor(light * (P.canopy.length + 0.8)))
                )
              ]
          x.fillStyle = c
          x.beginPath()
          x.arc(bx, by, b.r * R * 1.3, 0, 7)
          x.fill()
        }
      }
      function paintTufts(x, S) {
        for (const tf of S.tufts) {
          if (tf.kind < 0.72) {
            x.strokeStyle = tf.kind < 0.36 ? P.grassLight : P.grassDark
            x.lineWidth = Math.max(1, tf.s * 0.14)
            x.beginPath()
            x.moveTo(tf.x, tf.y)
            x.quadraticCurveTo(
              tf.x + tf.s * 0.4,
              tf.y - tf.s * 0.7,
              tf.x + tf.s * 0.2,
              tf.y - tf.s * 1.3
            )
            x.stroke()
          } else {
            x.fillStyle = tf.kind < 0.86 ? 'rgba(244,168,196,0.8)' : 'rgba(255,250,240,0.8)'
            x.beginPath()
            x.arc(tf.x, tf.y, Math.max(1.2, tf.s * 0.16), 0, 7)
            x.fill()
          }
        }
      }
      function paintPetals(x, S, t) {
        for (const p of S.petals) {
          const yy = ((p.y + p.vy * t) % (S.H + 30)) - 15
          const xx = p.x + Math.sin(t * 0.9 + p.ph) * p.sway
          x.save()
          x.translate(xx, yy)
          x.rotate(p.rot + t * 0.6 + p.ph)
          x.fillStyle = 'rgba(244,168,196,0.85)'
          x.beginPath()
          x.ellipse(0, 0, p.s, p.s * 0.55, 0, 0, 7)
          x.fill()
          x.restore()
        }
      }

      /* ---------- compose ---------- */
      function renderScene(x, W, H, t, scene) {
        const S = scene
        paintSky(x, S)
        for (const c of S.clouds) {
          const cx = ((c.x + c.v * t) % (W * 1.3)) - W * 0.15
          paintCloud(x, cx, c.y, c.s)
        }
        paintMountains(x, S)
        paintLand(x, S)
        paintFarTrees(x, S)
        paintRiver(x, S)
        paintReflections(x, S)
        paintShimmer(x, S, t)
        // bank trees back-to-front, then tufts, then foreground trees
        const sorted = [...S.trees].sort((a, b) => a.y - b.y)
        for (const tr of sorted) if (tr.y <= H * 0.8) paintTree(x, tr, S)
        paintTufts(x, S)
        for (const tr of sorted) if (tr.y > H * 0.8) paintTree(x, tr, S)
        paintPetals(x, S, t)
      }

      /* ---------- view loop ---------- */
      const view = document.getElementById('view')
      const VW = 1920,
        VH = 1080
      view.width = VW
      view.height = VH
      const vx = view.getContext('2d')
      let scene = buildScene(VW, VH, mulberry32(SEED))
      const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches
      let lastDraw = 0
      function loop(now) {
        if (!reduced && now - lastDraw > 33) {
          lastDraw = now
          renderScene(vx, VW, VH, now / 1000, scene)
        }
        requestAnimationFrame(loop)
      }
      renderScene(vx, VW, VH, 0, scene)
      requestAnimationFrame(loop)

      /* ---------- export + reseed ---------- */
      function download(w, h) {
        const c = document.createElement('canvas')
        c.width = w
        c.height = h
        const sc = buildScene(w, h, mulberry32(SEED))
        renderScene(c.getContext('2d'), w, h, 38.2, sc) // a pleasant shimmer phase
        c.toBlob((b) => {
          const a = document.createElement('a')
          a.href = URL.createObjectURL(b)
          a.download = `blossom-river-${SEED}-${w}x${h}.png`
          a.click()
        }, 'image/png')
      }
      document.getElementById('dl1080').addEventListener('click', () => download(1920, 1080))
      document.getElementById('dl4k').addEventListener('click', () => download(3840, 2160))
      document.getElementById('reseed').addEventListener('click', () => {
        SEED = (SEED * 16807 + 11) % 2147483647
        localStorage.setItem('blossom-seed', String(SEED))
        scene = buildScene(VW, VH, mulberry32(SEED))
        renderScene(vx, VW, VH, 0, scene)
      })
    </script>
  </body>
</html>
