<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP is rewritten at build time by the `canvas-ade-csp-meta` plugin
      (electron.vite.config.ts): DEV keeps script-src 'unsafe-inline' for Vite's
      HMR preamble; the packaged build drops it → script-src 'self'. The content
      below is the dev placeholder (used if the plugin ever no-ops). style-src
      keeps 'unsafe-inline' (pervasive React inline style attributes can't be
      nonce'd). See the plugin's doc comment for the full rationale.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: http://localhost:* http://127.0.0.1:*"
    />
    <title>Canvas ADE</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
