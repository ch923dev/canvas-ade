appId: com.expanse.app
productName: Expanse
copyright: Copyright © 2026 cdeasis923

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

# node-pty ships a native .node binary + helper executables that must NOT be
# packed inside app.asar, or they fail only in the packaged build.
#
# The terminal-recap SessionStart hook (recordSession.js) is run by an EXTERNAL process
# (Claude, via `node <path>`), so it needs a REAL on-disk path — a path inside app.asar
# can't be executed by node. Unpack it (alongside the native binaries) so it is extracted
# to app.asar.unpacked and the `recordScript` path computed in main resolves to a real file.
asarUnpack:
  - '**/*.node'
  - 'node_modules/node-pty/**'
  - '**/hooks/recordSession.js'

npmRebuild: true

# Arch is driven per-job by the CI matrix CLI flags (--x64 / --arm64), NOT pinned
# here — a hardcoded `arch: [x64, arm64]` overrides the flag and makes a single-arch
# job (e.g. the native arm64 Linux runner) also attempt the other arch, which g++
# can't cross-build (`-m64` unsupported on arm). Leaving arch unset lets each
# native runner build only what its CLI flag requests.
win:
  target:
    - target: nsis
  artifactName: ${productName}-${version}-${arch}.${ext}
  # Multi-size .ico (scripts/gen-icon-win.mjs): detailed mark at 256/128/64, a bold
  # simplified variant at 48/32/16 so the taskbar/Explorer icon stays legible (the
  # thin perspective lines + small diamond turn to mush when a single 1024 PNG is
  # auto-downscaled). Explicit so electron-builder uses these frames, not a re-derive.
  icon: build/icon.ico
  # Phase 5 signing (STAGED): when a code-signing cert is provided via env —
  # CSC_LINK (base64 cert or a path) + CSC_KEY_PASSWORD — electron-builder
  # Authenticode-signs the app + installer automatically. Absent → unsigned build
  # (Windows SmartScreen warns on first run). Modern OV/EV certs live on a hardware
  # token / cloud HSM, not a portable .pfx; for those, use a cloud-signing provider
  # (e.g. Azure Trusted Signing) and set its secrets. See docs/contributing/releasing.md.

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

mac:
  target:
    - target: dmg
  # macOS uses the padded variant (build/icon-mac.png) — Apple's app-icon grid
  # expects ~100px transparent margin so the Dock icon matches native apps; the
  # shared build/icon.png is full-bleed (correct for win .ico / linux PNG, oversized
  # on macOS). Regenerate via `node scripts/gen-icon-mac.mjs` after a brand change.
  icon: build/icon-mac.png
  category: public.app-category.developer-tools
  # Phase 5 signing (STAGED). Hardened runtime + entitlements are REQUIRED for
  # notarization. When signing secrets are absent (local/staging) electron-builder
  # SKIPS signing + notarization gracefully (unsigned build). When CSC_LINK +
  # CSC_KEY_PASSWORD are set it signs with the Developer ID cert, and when the
  # APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID env are also present it
  # auto-notarizes. `identity: null` (force-unsigned) is intentionally removed so a
  # provided cert is honored; CI keeps CSC_IDENTITY_AUTO_DISCOVERY=false so no stray
  # keychain identity is ever picked up. See docs/contributing/releasing.md.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist

linux:
  target:
    - target: AppImage
  category: Development

# Update feed + release upload target (Phase 5). The GitHub provider does two things:
# (1) lets `electron-builder --publish always` upload assets to the published Release
#     (the production workflow). The previous `publish: null` SILENTLY NULLIFIED that
#     CLI flag, so the release job went green while uploading zero assets (the
#     bug-hunt finding at this line); and
# (2) bakes app-update.yml into the app so electron-updater can read the HTTPS feed.
#
# SECURITY INVARIANT (audit `electron-updater-unsigned-latent`): configuring the feed
# here does NOT by itself enable auto-update. The autoUpdater.checkForUpdates call
# (src/main/autoUpdate.ts) is fenced behind the __ENABLE_AUTO_UPDATE__ build constant,
# which is true ONLY when the production CI build sets ENABLE_AUTO_UPDATE=1 — and that
# is set ONLY when code-signing secrets are present. An unsigned build therefore never
# pulls an update over the feed (the remote-code-execution vector this invariant
# guards). Do NOT flip the gate on for unsigned builds.
publish:
  provider: github
  owner: ch923dev
  repo: canvas-ade
