# Dependabot — automated dependency + GitHub Actions update PRs.
# Pairs with the `pnpm audit` SCA step (pr.yml) + CodeQL (codeql.yml): audit
# flags advisories, dependabot opens the bump PRs that clear them. This is what
# would have surfaced the EOL Electron 33 bump automatically.
version: 2
updates:
  # npm / pnpm dependencies (root manifest).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # @expanse-ade/mcp is a PUBLIC npmjs package — tracked automatically as a normal
    # npm dep (no registries: block / PAT needed, unlike the old GitHub Packages dep).

  # GitHub Actions used in .github/workflows/*.yml.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
