# Dependabot — automated dependency + GitHub Actions update PRs.
# Pairs with the `pnpm audit` SCA step (pr.yml) + CodeQL (codeql.yml): audit
# flags advisories, dependabot opens the bump PRs that clear them. This is what
# would have surfaced the EOL Electron 33 bump automatically.
version: 2
updates:
  # npm / pnpm dependencies (root manifest).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # NOTE: the private @ch923dev/canvas-ade-mcp dep (GitHub Packages, see .npmrc
    # `@ch923dev:registry=https://npm.pkg.github.com`) is NOT tracked here. To have
    # dependabot bump it too, add a top-level `registries:` block authenticated with
    # a PAT secret (read:packages) and reference it via `registries:` on this update.
    # Left as a documented follow-up — we don't wire the secret here.

  # GitHub Actions used in .github/workflows/*.yml.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
