name: staging

# Staging: on every push to main. Validates, then packages the full matrix and
# uploads UNSIGNED artifacts (Actions artifacts, 7-day retention). No release.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # node-gyp (rebuilds node-pty in postinstall) imports distutils, removed from
      # the Python 3.12 stdlib that GitHub runners now ship — pin 3.11 (has distutils).
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - run: pnpm build

  # NOTE: e2e (Playwright _electron) is NOT a GitHub Actions job. It runs LOCALLY as a
  # pre-commit gate (the full Windows + Linux matrix via `.githooks/pre-commit` →
  # `pnpm test:e2e:matrix`). Decided 2026-06-03 — Actions e2e was billing-blocked, and
  # the native/Docker e2e is cheaper + faster on the dev box. See docs/testing/TESTING.md.

  # Full per-OS / per-arch packaging matrix. Unsigned until Phase 5.
  package:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        # One job per NATIVE (os, arch) where the toolchain can't cross-build native
        # modules (Linux g++), and a single job where it can (Windows MSVC + macOS
        # clang both cross-compile x64↔arm64). macos-13 (x64) is dropped — the runner
        # is scarce/queues forever; macOS x64 is built on the arm runner instead.
        include:
          - os: windows-latest
            args: --win --x64 --arm64
          - os: macos-14
            args: --mac --x64 --arm64
          - os: ubuntu-latest
            args: --linux --x64
          - os: ubuntu-24.04-arm
            args: --linux --arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: corepack enable
      - name: Install (rebuilds node-pty against Electron ABI)
        run: pnpm install --frozen-lockfile
      - name: Package
        run: pnpm exec electron-vite build && pnpm exec electron-builder ${{ matrix.args }} --publish never
        env:
          # Skip macOS code-sign/notarize until Phase 5 (no certs in CI yet).
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v7
        with:
          name: canvas-ade-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.zip
          if-no-files-found: ignore
          retention-days: 7
