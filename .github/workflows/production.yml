name: production

# Production: when a GitHub Release is published. Validates, packages + signs the full
# matrix, and emits the signed installers + feed files (latest*.yml + *.blockmap) as
# workflow ARTIFACTS. It does NOT upload to the GitHub Release: the update feed's
# electron-builder `publish` provider is `generic` (Cloudflare R2), which is READ-ONLY — it
# cannot push assets (electron-builder.yml). The feed UPLOAD is a separate, out-of-band step
# (scripts/release.mjs assembles release/feed/ and rclone-copies it to R2); see
# docs/contributing/releasing.md. Builds stay unsigned until the signing secrets exist.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read # build + sign only; the feed is published to R2 out-of-band, not to the Release

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # node-gyp (rebuilds node-pty in postinstall) imports distutils, removed from
      # the Python 3.12 stdlib that GitHub runners now ship — pin 3.11 (has distutils).
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - run: pnpm build

  # Full per-OS / per-arch packaging + signing matrix. The signed installers + feed files are
  # emitted as workflow artifacts (the generic/R2 feed provider is read-only, so electron-builder
  # cannot publish them — the R2 upload is scripts/release.mjs's job, out-of-band). Only a genuine
  # 'Release published' event runs this; a workflow_dispatch run still exercises `check` but MUST
  # NOT reach the signed pipeline from an arbitrary ref — that would bypass the Release checkpoint
  # (see docs/contributing/releasing.md).
  publish:
    needs: check
    if: github.event_name == 'release'
    strategy:
      fail-fast: false
      matrix:
        # One job per NATIVE (os, arch) where the toolchain can't cross-build native
        # modules (Linux g++), and a single job where it can (Windows MSVC + macOS
        # clang both cross-compile x64↔arm64). macos-13 (x64) is dropped — the runner
        # is scarce/queues forever; macOS x64 is built on the arm runner instead.
        include:
          - os: windows-latest
            args: --win --x64 --arm64
          - os: macos-14
            args: --mac --x64 --arm64
          - os: ubuntu-latest
            args: --linux --x64
          - os: ubuntu-24.04-arm
            args: --linux --arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: corepack enable
      - name: Install (rebuilds node-pty against Electron ABI)
        run: pnpm install --frozen-lockfile
      - name: Package + sign (no publish — the generic/R2 feed provider is read-only)
        run: pnpm exec electron-vite build && pnpm exec electron-builder ${{ matrix.args }} --publish never
        env:
          # ── Phase 5 code signing (STAGED) ──────────────────────────────────────────
          # Every value below comes from a repo secret/variable. When a secret is unset,
          # electron-builder degrades GRACEFULLY to an UNSIGNED build (notarization is
          # skipped), so this release pipeline keeps working before any certs exist. Add
          # the secrets to flip to signed releases — NO workflow edit needed. Full setup
          # (cert formats, cloud signers, the auto-update switch): docs/contributing/releasing.md.
          #
          # macOS — Developer ID cert (CSC_LINK = base64 .p12, CSC_KEY_PASSWORD = its
          # password) + notarization (Apple ID + app-specific password + team id):
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows — Authenticode cert as a .pfx (WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD).
          # Modern OV/EV certs on a hardware token / cloud HSM use a cloud signer instead
          # (e.g. Azure Trusted Signing) — see the releasing guide; these stay empty then.
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          # Never auto-pick a stray keychain identity on the macOS runner (signing still
          # happens via CSC_LINK when present; this only disables implicit discovery).
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Auto-update is enabled ONLY when this repo variable is set to "1" — flip it on
          # DELIBERATELY after you've verified signing works (the security invariant: never
          # auto-update an unsigned build over a feed). Bakes __ENABLE_AUTO_UPDATE__=true
          # into the main bundle (electron.vite.config.ts define).
          ENABLE_AUTO_UPDATE: ${{ vars.AUTO_UPDATE == '1' && '1' || '' }}

      # Emit ONLY the files the R2 feed serves — installers, blockmaps, and the latest*.yml
      # electron-updater manifests — as a per-job artifact. This is what replaces the old
      # (broken) `--publish always` upload: scripts/release.mjs assembles release/feed/ from
      # exactly these files and rclone-copies them to R2 (docs/contributing/releasing.md).
      - name: Upload signed installers + feed files
        uses: actions/upload-artifact@v4
        with:
          name: feed-${{ matrix.os }}
          path: |
            release/latest*.yml
            release/*.blockmap
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
          if-no-files-found: warn
          retention-days: 7
