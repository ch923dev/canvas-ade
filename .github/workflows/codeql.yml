name: codeql

# Static analysis (SAST) for JS/TS. Complements the dependency-side SCA (pnpm
# audit + dependabot): CodeQL scans OUR source for vulnerabilities, audit scans
# the dependency tree. Results surface in the repo's Security → Code scanning tab.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly full scan (catches newly-published queries against unchanged code).
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Default + security-extended query suite for broader coverage.
          queries: security-extended

      # No build step: javascript-typescript uses CodeQL's none/auto build mode,
      # so we skip `pnpm install`/`build` (avoids the private @ch923dev scope auth
      # and the node-pty native rebuild). Analyze the source as-is.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
