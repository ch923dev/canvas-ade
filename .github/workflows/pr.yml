name: pr

# Pull-request gate: validation only. No packaging, no artifact upload.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  # Read @ch923dev/canvas-ade-mcp from GitHub Packages. The canvas-ade repo must be
  # granted read access to that package for this token to resolve it (Package →
  # Settings → Manage Actions access → add canvas-ade: Read).
  packages: read

# Auth for the GitHub Packages registry (@ch923dev scope in .npmrc). Applies to
# every job's `pnpm install`.
env:
  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # Fast feedback: typecheck + lint + tests + bundle on Linux.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # node-gyp (rebuilds node-pty in postinstall) imports distutils, removed from
      # the Python 3.12 stdlib that GitHub runners now ship — pin 3.11 (has distutils).
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - run: pnpm build

  # Headless board e2e smoke on Windows (node-pty / ConPTY fidelity).
  # runE2ESmoke sets process.exitCode + app.exit(code), so a failed assertion fails the job.
  #
  # FROZEN (2026-06-03): the board e2e smoke is DISABLED until we build a structured
  # testing setup. There is a larger e2e reliability issue (the CANVAS_SMOKE=e2e harness
  # is a brittle stand-in) on top of the known CI-only `whiteboard-fullview-add`
  # determinism flake. Do NOT let e2e gate work meanwhile — `check` is the gate. Re-enable
  # by removing this `if: false`. See CLAUDE.md › Status.
  smoke:
    if: false
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Board e2e smoke
        run: pnpm start
        env:
          CANVAS_SMOKE: e2e
      # MCP live tier + all-board-listing smoke against the real running app.
      # runMcpSmoke sets process.exitCode + app.exit(code), so a failed assertion fails the job.
      - name: MCP smoke
        run: pnpm start
        env:
          CANVAS_SMOKE: mcp
