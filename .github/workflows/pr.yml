name: pr

# Pull-request gate: validation only. No packaging, no artifact upload.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  # Read @ch923dev/canvas-ade-mcp from GitHub Packages. The canvas-ade repo must be
  # granted read access to that package for this token to resolve it (Package →
  # Settings → Manage Actions access → add canvas-ade: Read).
  packages: read

# Auth for the GitHub Packages registry (@ch923dev scope in .npmrc). Applies to
# every job's `pnpm install`.
env:
  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # Fast feedback: typecheck + lint + tests + bundle on Linux.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # node-gyp (rebuilds node-pty in postinstall) imports distutils, removed from
      # the Python 3.12 stdlib that GitHub runners now ship — pin 3.11 (has distutils).
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - run: pnpm build

  # NOTE: e2e (Playwright _electron) is NOT a GitHub Actions job. It runs LOCALLY as a
  # pre-commit gate (the full Windows + Linux matrix via `.githooks/pre-commit` →
  # `pnpm test:e2e:matrix`). Decided 2026-06-03 — Actions e2e was billing-blocked, and
  # the native/Docker e2e is cheaper + faster on the dev box. See docs/testing/TESTING.md.
