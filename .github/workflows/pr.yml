name: pr

# Pull-request gate: validation only. No packaging, no artifact upload.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  # Read @ch923dev/canvas-ade-mcp from GitHub Packages. The canvas-ade repo must be
  # granted read access to that package for this token to resolve it (Package →
  # Settings → Manage Actions access → add canvas-ade: Read).
  packages: read

# Auth for the GitHub Packages registry (@ch923dev scope in .npmrc). Applies to
# every job's `pnpm install`.
env:
  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # Fast feedback: typecheck + lint + tests + bundle on Linux.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # node-gyp (rebuilds node-pty in postinstall) imports distutils, removed from
      # the Python 3.12 stdlib that GitHub runners now ship — pin 3.11 (has distutils).
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      # SCA / supply-chain gate. NON-BLOCKING for now: the current tree carries
      # HIGH/critical advisories (EOL Electron 33 + transitive tar/node-gyp + a
      # vitest dev-server CVE) that can't be cleared until the Electron bump (T9).
      # `continue-on-error` keeps it visible (red step, surfaces new advisories on
      # every PR) without blocking the gate. `|| true` also keeps the step resilient
      # if `pnpm audit` itself errors on the private @ch923dev scope advisory lookup.
      # TODO(T9): flip to a hard gate (drop continue-on-error + `|| true`) once
      # Electron is bumped off EOL and the tree is clean.
      - name: pnpm audit (SCA — non-blocking until T9)
        continue-on-error: true
        run: pnpm audit --audit-level=high || true
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - run: pnpm build

  # NOTE: e2e (Playwright _electron) is NOT a GitHub Actions job. It runs LOCALLY as a
  # pre-commit gate (the full Windows + Linux matrix via `.githooks/pre-commit` →
  # `pnpm test:e2e:matrix`). Decided 2026-06-03 — Actions e2e was billing-blocked, and
  # the native/Docker e2e is cheaper + faster on the dev box. See docs/testing/TESTING.md.
