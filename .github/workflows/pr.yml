name: pr

# Pull-request gate: validation only. No packaging, no artifact upload.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Fast feedback: typecheck + lint + tests + bundle on Linux.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      # node-gyp (rebuilds node-pty in postinstall) imports distutils, removed from
      # the Python 3.12 stdlib that GitHub runners now ship — pin 3.11 (has distutils).
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      # SCA / supply-chain gate — HARD as of T9. The tree is clean at high+:
      # Electron 33→42 (off EOL), vitest 2→4 (cleared the dev-server CVE), and a
      # pnpm `overrides` pin of tar ≥7.5.8 (the electron-builder squirrel-windows
      # sub-chain still dragged tar 6.2.1). A new HIGH/critical advisory still BLOCKS
      # the PR; findings below `high` print as non-blocking notes.
      # 2026-07-16: npmjs RETIRED the classic audit endpoints (HTTP 410 — `pnpm audit`
      # is broken on EVERY pnpm version, 9 and 10 alike). Same gate, new mechanism:
      # scripts/sca-audit.mjs queries the replacement BULK advisory endpoint directly
      # and fails at high+ exactly like `pnpm audit --audit-level=high` did.
      - name: SCA audit (bulk advisory endpoint)
        run: node scripts/sca-audit.mjs --audit-level=high
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - run: pnpm build

  # NOTE: e2e (Playwright _electron) is NOT a GitHub Actions job. It runs LOCALLY as a
  # pre-commit gate (the full Windows + Linux matrix via `.githooks/pre-commit` →
  # `pnpm test:e2e:matrix`). Decided 2026-06-03 — Actions e2e was billing-blocked, and
  # the native/Docker e2e is cheaper + faster on the dev box. See docs/testing/TESTING.md.
