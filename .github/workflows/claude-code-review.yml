name: claude-review

# Automated PR review + triage. On every (non-draft) PR open/push, Claude reviews
# the diff, posts INLINE comments on the problem lines (anchored to file+line) plus
# one summary comment, clears its OWN prior review first (so re-pushes never stack
# stale duplicate threads), then applies this repo's existing labels and (only if one
# clearly fits) a milestone. It never CREATES labels or milestones — it only chooses
# from what already exists (see `gh label list` / the milestones API).
# Disposition-aware: before re-reviewing it reads the human replies on its own threads
# and any author "Dispositions: …" summary, PRESERVES inline threads a human replied to
# (never orphans a disposition), and does NOT re-flag a finding the author already fixed,
# accepted, or declined-with-reason. This stops the re-flag-after-disposition loop seen
# on PR #92.
# Complements the deterministic `pr` gate (typecheck/lint/test/build) and `codeql`
# (SAST): those say "is it green", this says "is it good".

on:
  pull_request:
    types: [opened, synchronize]
    # Optional: only review when certain files change
    # paths:
    #   - "src/**"

concurrency:
  # Cancel an in-progress review if a new push arrives on the same PR.
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Skip draft PRs; remove this line if you want drafts reviewed too.
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # inline review comments + edit labels/milestone
      issues: write # labels and milestones go through the issues API
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # mcp__github_inline_comment__create_inline_comment is the action's built-in
          # tool for posting comments anchored to specific lines.
          # gh api allowlist is narrowed to EXACTLY the forms used in the prompt
          # (BUG-069: the previous "gh api:*" allowed any method on any endpoint,
          # enabling prompt-injection payloads to self-approve PRs, close issues, etc.):
          #
          # Allowed gh api forms and why each is needed:
          #   gh api repos/.../pulls/.../comments    -- list inline comments (step 1 self-clear + step 2 dispositions)
          #   gh api -X DELETE repos/.../pulls/comments/...  -- delete own inline comment in self-clear (step 1)
          #   gh api repos/.../issues/.../comments   -- list issue/summary comments (step 1 self-clear + step 2 dispositions)
          #   gh api -X DELETE repos/.../issues/comments/... -- delete own summary comment in self-clear (step 1)
          #   gh api repos/.../milestones            -- list milestones (step 7)
          #
          # The allowlist uses prefix-match semantics: each entry covers calls whose
          # command string STARTS with that prefix. We explicitly exclude -X POST/PATCH
          # on pulls (no self-approval) and issues (no close/edit via this tool).
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr edit:*),Bash(gh label list:*),Bash(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments:*),Bash(gh api -X DELETE repos/${{ github.repository }}/pulls/comments:*),Bash(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments:*),Bash(gh api -X DELETE repos/${{ github.repository }}/issues/comments:*),Bash(gh api repos/${{ github.repository }}/milestones:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Every comment you post (inline AND summary) MUST end with this exact hidden
            marker on its own line so it can be found and cleared on the next push:
            <!-- claude-code-review:auto -->

            You are reviewing this pull request like a senior engineer on the Canvas ADE
            (Expanse) Electron desktop app. Perform these tasks in order.

            ## 1. Clear your previous review (but PRESERVE dispositioned threads)
            This PR may have been reviewed by you on an earlier push. Delete your own prior
            comments (the ones carrying the marker above) so the review never accumulates
            stale duplicate threads — with ONE exception: NEVER delete an inline comment of
            yours that a human has REPLIED to. A human reply on one of your comments is a
            disposition (a fix, a refactor, or a reasoned "leave as-is"); deleting the root
            would orphan that thread and lose the author's response. Preserve those threads
            intact. Leave all human comments untouched.

            Delete your previous inline review comments EXCEPT any that have a human reply.
            An auto comment has a human reply when another comment's in_reply_to_id points at
            its id and that reply does NOT carry the marker. Keep this a single pipeline that
            STARTS with `gh api` (the allowlist matches the command prefix) — `$replied` is the
            set of your comment ids that have a non-marker reply, and only ids NOT in that set
            are deleted:
              gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments --paginate \
                --jq '([.[] | select(.in_reply_to_id != null and ((.body | contains("claude-code-review:auto")) | not)) | .in_reply_to_id] | unique) as $replied | .[] | select(.body | contains("claude-code-review:auto")) | select(($replied | index(.id)) | not) | .id' \
              | while read id; do
                  gh api -X DELETE repos/${{ github.repository }}/pulls/comments/$id
                done

            Delete your previous summary comment (summaries have no inline thread, so always
            clear the old one):
              gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments --paginate \
                --jq '.[] | select(.body | contains("claude-code-review:auto")) | .id' \
              | while read id; do
                  gh api -X DELETE repos/${{ github.repository }}/issues/comments/$id
                done

            ## 2. Read prior human dispositions (do this BEFORE reviewing)
            Find out what a human has ALREADY responded to, so you never re-flag a finding
            they have addressed. There are two sources:

            (a) Inline replies to your previous comments. A human reply on one of your threads
                is a disposition. List your auto inline comments and any replies to them:
                  gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments --paginate \
                    --jq '.[] | {id, path, line, in_reply_to_id, user: .user.login, body}'
            (b) Issue-level human comments — e.g. a "Dispositions: …" summary like the one the
                author may post listing how each finding was handled:
                  gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments --paginate \
                    --jq '.[] | select((.body | contains("claude-code-review:auto")) | not) | {user: .user.login, body}'

            From these, build a list of findings the human has already handled — whether they
            FIXED it, ACCEPTED it as low / won't-fix, or DECLINED it with a stated reason.
            Treat all three as resolved; you will skip them in step 4. Match by file + line +
            topic, not exact wording (the author paraphrases).

            ## 3. Review the code
            Read the diff with `gh pr diff` and open the surrounding files in the working
            directory to verify findings before posting. Look for:
            - Code quality and best practices
            - Bugs and logic errors
            - Security concerns (this is an Electron app — sandbox/contextIsolation/IPC
              boundaries, PTY input trust, native WebContentsView handling all matter)
            - Performance considerations
            - Broken edge cases and missing error handling
            - Missing or inadequate tests

            Read the repository's CLAUDE.md for the architecture, the locked decisions, and
            the style/convention rules — hold the diff against them. Focus on real issues,
            not style nitpicks the linter already enforces. If the PR is clean, say so
            plainly rather than inventing concerns.

            ## 4. Post inline comments on the problem lines
            Do NOT re-post any finding the human already dispositioned in step 2 (fixed,
            accepted-as-low, or declined-with-reason) — even if you still believe it.
            Re-raising a settled point stacks noise and overrides the author's decision. If
            you genuinely think a DECLINED finding is critical (a real bug or security hole,
            not a nit), do not re-open the inline thread: mention it ONCE, briefly, in the
            step-5 summary and defer to the author.

            For EACH NEW or still-unaddressed issue, post an inline comment anchored to the
            exact file and line(s) using mcp__github_inline_comment__create_inline_comment with
            confirmed: true. In each comment:
            - State the issue and its severity: [critical], [warning], or [nit]
            - Explain why it's a problem (1-3 sentences)
            - For small, self-contained fixes (5 lines or fewer), include a committable
              GitHub suggestion block:
              ```suggestion
              <corrected code>
              ```
              Only use a suggestion block if committing it fully fixes the issue. For
              larger or structural fixes, describe the fix in words instead.
            - End the comment body with the hidden marker.

            ## 5. Post a summary comment
            After all inline comments, post ONE summary with:
            gh pr comment ${{ github.event.pull_request.number }} --body "..."
            Include: a 2-3 sentence overview of the PR, a short table of issues found by
            severity, and what you checked. If you found no issues, post only this summary
            saying the PR looks good. End the body with the hidden marker.

            ## 6. Apply labels
            Run `gh label list` to see the labels that exist. This repo uses a STRUCTURED
            scheme — pick from existing labels only, never create new ones:
            - Exactly one `type/*` — the kind of change:
              feature · fix · refactor · docs · research · chore · test
            - One or two `area/*` — the subsystem(s) touched:
              canvas · terminal · preview · planning · persistence · mcp · security ·
              ci · e2e · design · packaging
            - A `severity/*` (critical/high/medium/low) ONLY if this is a bug fix.
            - `status/blocked` or `priority` only if clearly warranted.

            Choose the 1–3 best-fitting EXISTING labels and apply them together:
            gh pr edit ${{ github.event.pull_request.number }} --add-label "type/fix" --add-label "area/canvas"

            Only use labels that already exist. Never create new labels. If nothing fits,
            skip this step.

            ## 7. Assign a milestone
            List open milestones:
            gh api repos/${{ github.repository }}/milestones --jq '.[].title'

            Assign one ONLY if exactly one milestone clearly matches this PR's scope
            (judge by the milestone title against the PR's title/description/changes):
            gh pr edit ${{ github.event.pull_request.number }} --milestone "Milestone Title"

            If no milestone clearly matches, or you are unsure, skip this step and note in
            your summary comment that no milestone was assigned. Never create new milestones.
