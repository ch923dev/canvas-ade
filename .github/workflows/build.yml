name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  # Read @ch923dev/canvas-ade-mcp from GitHub Packages. The canvas-ade repo must be
  # granted read access to that package for this token to resolve it (Package →
  # Settings → Manage Actions access → add canvas-ade: Read).
  packages: read

# Auth for the GitHub Packages registry (@ch923dev scope in .npmrc). Applies to
# every job's `pnpm install`.
env:
  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # Fast feedback: typecheck + bundle on Linux before the build matrix fans out.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # node-gyp (rebuilds node-pty in postinstall) imports distutils, removed from
      # the Python 3.12 stdlib that GitHub runners now ship — pin 3.11 (has distutils).
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - run: pnpm build

  # Headless board e2e smoke on Windows (node-pty / ConPTY fidelity).
  # runE2ESmoke sets process.exitCode + app.exit(code), so a failed assertion fails the job.
  smoke:
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Board e2e smoke
        run: pnpm start
        env:
          CANVAS_SMOKE: e2e

  # Full per-OS / per-arch packaging matrix. Unsigned until Phase 5.
  package:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        # One job per NATIVE (os, arch) where the toolchain can't cross-build native
        # modules (Linux g++), and a single job where it can (Windows MSVC + macOS
        # clang both cross-compile x64↔arm64). macos-13 (x64) is dropped — the runner
        # is scarce/queues forever; macOS x64 is built on the arm runner instead.
        include:
          - os: windows-latest
            args: --win --x64 --arm64
          - os: macos-14
            args: --mac --x64 --arm64
          - os: ubuntu-latest
            args: --linux --x64
          - os: ubuntu-24.04-arm
            args: --linux --arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: corepack enable
      - name: Install (rebuilds node-pty against Electron ABI)
        run: pnpm install --frozen-lockfile
      - name: Package
        run: pnpm exec electron-vite build && pnpm exec electron-builder ${{ matrix.args }} --publish never
        env:
          # Skip macOS code-sign/notarize until Phase 5 (no certs in CI yet).
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: canvas-ade-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.zip
          if-no-files-found: ignore
          retention-days: 7
